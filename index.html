<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flappy Bird</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #1a1a2e;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: 'Segoe UI', sans-serif;
    user-select: none;
  }
  h1 { color: #ffd700; font-size: 1.4rem; margin-bottom: 12px; letter-spacing: 2px; }
  #ui { display: flex; gap: 12px; margin-bottom: 10px; flex-wrap: wrap; justify-content: center; }
  .stat { background: #16213e; border-radius: 8px; padding: 8px 20px; text-align: center; border: 1px solid #0f3460; }
  .stat-label { font-size: 11px; color: #aaa; text-transform: uppercase; letter-spacing: 1px; }
  .stat-val { font-size: 22px; font-weight: 700; color: #ffd700; }
  canvas { border-radius: 10px; border: 2px solid #0f3460; display: block; cursor: pointer; touch-action: manipulation; }
  #shopBtn {
    margin-top: 10px;
    background: #1e3a8a;
    color: #fff;
    border: 1px solid #3257c2;
    border-radius: 8px;
    padding: 8px 14px;
    font-weight: 700;
    cursor: pointer;
  }
  #shopBtn:disabled { opacity: 0.5; cursor: not-allowed; }
  #shopPanel {
    margin-top: 12px;
    width: min(96vw, 420px);
    background: #0f1b33;
    border: 1px solid #264b8f;
    border-radius: 10px;
    padding: 12px;
    color: #d6e1ff;
  }
  #shopPanel.hidden { display: none; }
  .shop-title { font-size: 14px; font-weight: 700; margin-bottom: 10px; color: #ffd700; }
  .skin-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
    padding: 8px;
    border: 1px solid #1b3564;
    border-radius: 8px;
    margin-bottom: 8px;
    background: #122446;
  }
  .skin-left { display: flex; align-items: center; gap: 8px; }
  .skin-dot {
    width: 14px;
    height: 14px;
    border-radius: 50%;
    border: 1px solid rgba(255,255,255,0.3);
    flex-shrink: 0;
  }
  .skin-meta { font-size: 12px; color: #9fb3df; }
  .skin-action {
    border: 1px solid #3b6ad2;
    background: #1c4ec0;
    color: #fff;
    border-radius: 6px;
    padding: 6px 10px;
    cursor: pointer;
    font-size: 12px;
    font-weight: 700;
    min-width: 82px;
  }
  .skin-action[disabled] { opacity: 0.55; cursor: not-allowed; }
  #hint { color: #888; font-size: 13px; margin-top: 10px; }
</style>
</head>
<body>

<h1>🐦 FLAPPY BIRD</h1>
<div id="ui">
  <div class="stat"><div class="stat-label">Score</div><div class="stat-val" id="scoreEl">0</div></div>
  <div class="stat"><div class="stat-label">Best</div><div class="stat-val" id="bestEl">0</div></div>
  <div class="stat"><div class="stat-label">Coins</div><div class="stat-val" id="coinEl">0</div></div>
</div>
<canvas id="gameCanvas" width="400" height="500"></canvas>
<button id="shopBtn" type="button">Skin Shop</button>
<div id="hint">Click / Space / Tap để flap</div>
<div id="shopPanel" class="hidden">
  <div class="shop-title">Skin Shop (mo khoa theo Best)</div>
  <div id="shopList"></div>
</div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx    = canvas.getContext('2d');
const scoreEl = document.getElementById('scoreEl');
const bestEl = document.getElementById('bestEl');
const coinEl = document.getElementById('coinEl');
const shopBtn = document.getElementById('shopBtn');
const shopPanel = document.getElementById('shopPanel');
const shopList = document.getElementById('shopList');
const W = canvas.width, H = canvas.height;

// ── CONSTANTS ──────────────────────────────────────────────
const IS_MOBILE     = window.matchMedia('(pointer: coarse)').matches || /Mobi|Android|iPhone|iPad|iPod/i.test(navigator.userAgent);
const GRAVITY       = IS_MOBILE ? 0.23 : 0.20;   // giảm độ rơi để dễ giữ cao độ
const FLAP_STRENGTH = IS_MOBILE ? -6.8 : -6.3;   // giảm độ cao mỗi lần nhảy để dễ canh hơn
const PIPE_WIDTH    = 60;
const GAP           = IS_MOBILE ? 192 : 176;     // tăng khe cột rõ rệt để bớt dính
const PIPE_SPEED    = IS_MOBILE ? 1.45 : 1.15;   // chậm lại nhẹ để có thêm thời gian phản xạ
const PIPE_INTERVAL = IS_MOBILE ? 150 : 180;     // cột thưa hơn một chút
const FLAP_COOLDOWN = IS_MOBILE ? 70 : 90;       // bấm nhảy liên tiếp dễ hơn
const SAVE_KEY = 'flappy_progress_v1';

const SKINS = [
  { id: 'classic', name: 'Classic', color: '#ffd700', wing: '#e8b800', beak: '#e8963a', price: 0, unlockBest: 0 },
  { id: 'mint', name: 'Mint', color: '#7cf5d0', wing: '#58dcb4', beak: '#f2a86d', price: 20, unlockBest: 5 },
  { id: 'rose', name: 'Rose', color: '#ff8fab', wing: '#f86b95', beak: '#ffbf69', price: 35, unlockBest: 10 },
  { id: 'neon', name: 'Neon', color: '#a5ff3b', wing: '#78d81c', beak: '#ffa94d', price: 60, unlockBest: 20 }
];

// ── STATE ──────────────────────────────────────────────────
let state, bird, pipes, score, best, frame, coins;
let lastFlapTime = 0;
best = 0;
coins = 0;
let purchasedSkinIds = new Set(['classic']);
let selectedSkinId = 'classic';

function getSkinById(id) {
  return SKINS.find(s => s.id === id) || SKINS[0];
}

function getCurrentSkin() {
  return getSkinById(selectedSkinId);
}

function saveProgress() {
  const payload = {
    best,
    coins,
    selectedSkinId,
    purchasedSkinIds: [...purchasedSkinIds]
  };
  localStorage.setItem(SAVE_KEY, JSON.stringify(payload));
}

function loadProgress() {
  const raw = localStorage.getItem(SAVE_KEY);
  if (!raw) return;
  try {
    const parsed = JSON.parse(raw);
    best = Number.isFinite(parsed.best) ? parsed.best : 0;
    coins = Number.isFinite(parsed.coins) ? parsed.coins : 0;
    const savedPurchased = Array.isArray(parsed.purchasedSkinIds) ? parsed.purchasedSkinIds : ['classic'];
    purchasedSkinIds = new Set(['classic', ...savedPurchased]);
    selectedSkinId = typeof parsed.selectedSkinId === 'string' ? parsed.selectedSkinId : 'classic';
    if (!purchasedSkinIds.has(selectedSkinId)) selectedSkinId = 'classic';
  } catch {
    best = 0;
    coins = 0;
    purchasedSkinIds = new Set(['classic']);
    selectedSkinId = 'classic';
  }
}

function updateStatsUi() {
  scoreEl.textContent = String(score);
  bestEl.textContent = String(best);
  coinEl.textContent = String(coins);
}

function isSkinUnlockedByBest(skin) {
  return best >= skin.unlockBest;
}

function refreshShopUi() {
  const rows = SKINS.map(skin => {
    const isOwned = purchasedSkinIds.has(skin.id);
    const isActive = selectedSkinId === skin.id;
    const unlockedByBest = isSkinUnlockedByBest(skin);
    let actionLabel = 'Khoa';
    let disabledAttr = ' disabled';

    if (isOwned) {
      actionLabel = isActive ? 'Dang dung' : 'Chon';
      disabledAttr = isActive ? ' disabled' : '';
    } else if (unlockedByBest) {
      actionLabel = `Mua ${skin.price}`;
      disabledAttr = coins >= skin.price ? '' : ' disabled';
    }

    const meta = isOwned
      ? 'Da so huu'
      : unlockedByBest
        ? `Can ${skin.price} coin`
        : `Mo khoa khi Best ${skin.unlockBest}`;

    return `
      <div class="skin-item">
        <div class="skin-left">
          <span class="skin-dot" style="background:${skin.color}"></span>
          <div>
            <div>${skin.name}</div>
            <div class="skin-meta">${meta}</div>
          </div>
        </div>
        <button class="skin-action" data-skin-id="${skin.id}"${disabledAttr}>${actionLabel}</button>
      </div>
    `;
  }).join('');

  shopList.innerHTML = rows;
}

function tryUnlockAndSelectSkin(skinId) {
  const skin = getSkinById(skinId);
  const isOwned = purchasedSkinIds.has(skin.id);
  const unlockedByBest = isSkinUnlockedByBest(skin);

  if (isOwned) {
    selectedSkinId = skin.id;
    saveProgress();
    refreshShopUi();
    return;
  }

  if (!unlockedByBest || coins < skin.price) return;
  coins -= skin.price;
  purchasedSkinIds.add(skin.id);
  selectedSkinId = skin.id;
  updateStatsUi();
  saveProgress();
  refreshShopUi();
}

// ── COLORS ─────────────────────────────────────────────────
const C = {
  sky:    '#70c5ce',
  ground: '#ded895',
  grass:  '#5db042',
  bird:   '#ffd700',
  beak:   '#e8963a',
  pipe:   '#5cb85c',
  pipeDk: '#3a7a3a',
  white:  '#ffffff',
  overlay:'rgba(0,0,0,0.48)',
  text:   '#ffffff',
  sub:    '#dddddd',
};

// ── INIT ───────────────────────────────────────────────────
function initGame() {
  bird  = { x: 82, y: H / 2, vy: 0, r: 16, rot: 0 };
  pipes = [];
  score = 0;
  frame = 0;
  state = 'idle';
  updateStatsUi();
}

// ── SPAWN PIPE ─────────────────────────────────────────────
function spawnPipe() {
  const topH = Math.random() * (H - GAP - 200) + 80;
  pipes.push({ x: W, topH, passed: false });
}

// ── FLAP — State Machine + Cooldown ───────────────────────
function flap() {
  const now = performance.now();

  if (state === 'dead') {
    initGame();
    return;
  }
  if (state === 'idle') {
    state = 'playing';
    bird.vy = FLAP_STRENGTH;
    lastFlapTime = now;
    return;
  }
  // Chặn spam: bỏ qua nếu chưa đủ cooldown
  if (now - lastFlapTime < FLAP_COOLDOWN) return;
  bird.vy = FLAP_STRENGTH;
  lastFlapTime = now;
}

// ── UPDATE — Physics + Collision ──────────────────────────
function update() {
  if (state !== 'playing') return;

  frame++;

  // Physics
  bird.vy  += GRAVITY;
  bird.y   += bird.vy;
  bird.rot  = Math.min(Math.max(bird.vy * 3.5, -25), 70);

  // Spawn pipe mỗi PIPE_INTERVAL frames
  if (frame % PIPE_INTERVAL === 0) spawnPipe();

  // Xử lý từng pipe
  for (const p of pipes) {
    p.x -= PIPE_SPEED;

    // Tính điểm
    if (!p.passed && p.x + PIPE_WIDTH < bird.x) {
      p.passed = true;
      score++;
      coins += 1;
      if (score > best) {
        best = score;
      }
      updateStatsUi();
      saveProgress();
      refreshShopUi();
    }

    // Collision Detection (AABB với padding nhỏ)
    const inX   = bird.x + bird.r - 8 > p.x && bird.x - bird.r + 8 < p.x + PIPE_WIDTH;
    const inTop = bird.y - bird.r + 8 < p.topH;
    const inBot = bird.y + bird.r - 8 > p.topH + GAP;
    if (inX && (inTop || inBot)) { state = 'dead'; return; }
  }

  // Dọn pipe ra khỏi màn hình
  pipes = pipes.filter(p => p.x + PIPE_WIDTH > -10);

  // Va chạm sàn: vẫn chết như cũ
  if (bird.y + bird.r >= H - 60) state = 'dead';

  // Va chạm trần: không chết, chỉ kẹp chim ở mép trên
  if (bird.y - bird.r <= 0) {
    bird.y = bird.r;
    if (bird.vy < 0) bird.vy = 0;
  }
}

// ── DRAW: BIRD ─────────────────────────────────────────────
function drawBird() {
  ctx.save();
  ctx.translate(bird.x, bird.y);
  ctx.rotate(bird.rot * Math.PI / 180);

  // Thân
  const skin = getCurrentSkin();
  ctx.beginPath();
  ctx.ellipse(0, 0, bird.r, bird.r - 3, 0, 0, Math.PI * 2);
  ctx.fillStyle = skin.color; ctx.fill();
  ctx.strokeStyle = '#c8a000'; ctx.lineWidth = 1; ctx.stroke();

  // Mắt trắng
  ctx.beginPath();
  ctx.ellipse(6, -5, 5, 4, 0, 0, Math.PI * 2);
  ctx.fillStyle = C.white; ctx.fill();

  // Con ngươi
  ctx.beginPath();
  ctx.ellipse(8, -5, 2.5, 2.5, 0, 0, Math.PI * 2);
  ctx.fillStyle = '#222'; ctx.fill();

  // Mỏ
  ctx.beginPath();
  ctx.moveTo(bird.r - 2, 0);
  ctx.lineTo(bird.r + 8, -3);
  ctx.lineTo(bird.r + 8,  3);
  ctx.closePath();
  ctx.fillStyle = skin.beak; ctx.fill();

  // Cánh (animate)
  const wingY = state === 'playing' ? Math.sin(frame * 0.3) * 4 : 2;
  ctx.beginPath();
  ctx.ellipse(-4, wingY, 10, 5, -0.3, 0, Math.PI * 2);
  ctx.fillStyle = skin.wing; ctx.fill();

  ctx.restore();
}

// ── DRAW: PIPE ─────────────────────────────────────────────
function drawPipe(p) {
  const capH = 18, capW = PIPE_WIDTH + 10, capX = p.x - 5;

  // Thân pipe trên
  ctx.fillStyle = C.pipe;
  ctx.fillRect(p.x, 0, PIPE_WIDTH, p.topH - capH);
  ctx.fillStyle = C.pipeDk;
  ctx.fillRect(p.x, 0, 6, p.topH - capH);
  ctx.fillRect(p.x + PIPE_WIDTH - 6, 0, 6, p.topH - capH);

  // Cap pipe trên
  ctx.fillStyle = C.pipe;
  ctx.beginPath(); ctx.rect(capX, p.topH - capH, capW, capH); ctx.fill();
  ctx.fillStyle = C.pipeDk;
  ctx.beginPath(); ctx.rect(capX, p.topH - capH, 8, capH); ctx.fill();

  // Thân pipe dưới
  const botY = p.topH + GAP;
  ctx.fillStyle = C.pipe;
  ctx.fillRect(p.x, botY + capH, PIPE_WIDTH, H - botY - capH - 60);
  ctx.fillStyle = C.pipeDk;
  ctx.fillRect(p.x, botY + capH, 6, H - botY - capH - 60);
  ctx.fillRect(p.x + PIPE_WIDTH - 6, botY + capH, 6, H - botY - capH - 60);

  // Cap pipe dưới
  ctx.fillStyle = C.pipe;
  ctx.beginPath(); ctx.rect(capX, botY, capW, capH); ctx.fill();
  ctx.fillStyle = C.pipeDk;
  ctx.beginPath(); ctx.rect(capX, botY, 8, capH); ctx.fill();
}

// ── DRAW: GROUND ───────────────────────────────────────────
function drawGround() {
  ctx.fillStyle = C.ground;
  ctx.fillRect(0, H - 60, W, 60);
  ctx.fillStyle = C.grass;
  ctx.fillRect(0, H - 60, W, 12);
  ctx.fillStyle = '#c8b060';
  for (let i = 0; i < W; i += 24) {
    ctx.fillRect(i + ((frame * 2) % 24) - 24, H - 62, 10, 5);
  }
}

// ── DRAW: OVERLAY ──────────────────────────────────────────
function drawOverlay(title, sub) {
  ctx.fillStyle = C.overlay;
  ctx.fillRect(0, 0, W, H);
  ctx.textAlign = 'center';
  ctx.fillStyle = C.text;
  ctx.font = '500 26px Segoe UI';
  ctx.fillText(title, W / 2, H / 2 - 30);
  ctx.font = '15px Segoe UI';
  ctx.fillStyle = C.sub;
  ctx.fillText(sub, W / 2, H / 2 + 10);
}

// ── DRAW MAIN ──────────────────────────────────────────────
function draw() {
  ctx.fillStyle = C.sky;
  ctx.fillRect(0, 0, W, H);

  pipes.forEach(drawPipe);
  drawGround();
  drawBird();

  if (state === 'idle') {
    drawOverlay('Flappy Bird', 'Click hoặc nhấn Space để bắt đầu');
  }
  if (state === 'dead') {
    drawOverlay('Game Over!  Score: ' + score, 'Click / Space để chơi lại');
  }
}

// ── GAME LOOP ──────────────────────────────────────────────
function loop() {
  update();
  draw();
  requestAnimationFrame(loop);
}

// ── INPUT ──────────────────────────────────────────────────
canvas.addEventListener('pointerdown', e => { e.preventDefault(); flap(); });
document.addEventListener('keydown', e => {
  if (e.code === 'Space') { e.preventDefault(); flap(); }
});

shopBtn.addEventListener('click', () => {
  if (state === 'playing') return;
  shopPanel.classList.toggle('hidden');
});

shopList.addEventListener('click', e => {
  const target = e.target;
  if (!(target instanceof HTMLElement)) return;
  const skinId = target.dataset.skinId;
  if (!skinId) return;
  tryUnlockAndSelectSkin(skinId);
});

// ── START ──────────────────────────────────────────────────
loadProgress();
refreshShopUi();
initGame();
loop();
</script>
</body>
</html>
